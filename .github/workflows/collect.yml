name: Collect traffic stats

on:
  schedule:
    - cron: '0 7 * * *'   # 7am UTC (~2am Central), after GitHub updates data
  workflow_dispatch:
    inputs:
      repos_mode:
        description: 'Which repos to track: pinned, all, or space-separated list'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve repo list
        id: repos
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          GH_USER: dmatking
          # Repo variable REPOS_MODE: "pinned" | "all" | "repo1 repo2 ..."
          # workflow_dispatch input overrides the variable if provided
          REPOS_MODE_VAR: ${{ vars.REPOS_MODE }}
          REPOS_MODE_INPUT: ${{ inputs.repos_mode }}
        run: |
          MODE="${REPOS_MODE_INPUT:-$REPOS_MODE_VAR}"
          MODE="${MODE:-pinned}"   # default to pinned if neither is set

          if [ "$MODE" = "pinned" ]; then
            REPOS=$(gh api graphql -f query='
              { user(login: "'"$GH_USER"'") {
                  pinnedItems(first: 6, types: REPOSITORY) {
                    nodes { ... on Repository { name } }
                  }
                }
              }' --jq '.data.user.pinnedItems.nodes[].name')

          elif [ "$MODE" = "all" ]; then
            REPOS=$(gh repo list "$GH_USER" --limit 100 --json name --jq '.[].name')

          else
            # Treat MODE as a space or comma-separated list of repo names
            REPOS=$(echo "$MODE" | tr ',' '\n' | tr ' ' '\n' | grep -v '^$')
          fi

          echo "repos<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPOS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Repos to collect: $(echo "$REPOS" | wc -l)"

      - name: Fetch traffic stats and append to CSV
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          GH_USER: dmatking
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          CSV=traffic.csv

          if [ ! -f "$CSV" ]; then
            echo "date,repo,views,view_uniques,clones,clone_uniques,stars,forks" > "$CSV"
          else
            # Remove any existing rows for today to avoid duplicates on re-run
            grep -v "^$DATE," "$CSV" > "$CSV.tmp" && mv "$CSV.tmp" "$CSV"
          fi

          while IFS= read -r REPO; do
            [ -z "$REPO" ] && continue
            STARS=$(gh api repos/$GH_USER/$REPO --jq '.stargazers_count // 0')
            FORKS=$(gh api repos/$GH_USER/$REPO --jq '.forks_count // 0')
            VIEWS=$(gh api repos/$GH_USER/$REPO/traffic/views --jq '.count // 0')
            VIEW_UNIQ=$(gh api repos/$GH_USER/$REPO/traffic/views --jq '.uniques // 0')
            CLONES=$(gh api repos/$GH_USER/$REPO/traffic/clones --jq '.count // 0')
            CLONE_UNIQ=$(gh api repos/$GH_USER/$REPO/traffic/clones --jq '.uniques // 0')
            echo "$DATE,$REPO,$VIEWS,$VIEW_UNIQ,$CLONES,$CLONE_UNIQ,$STARS,$FORKS" >> "$CSV"
          done <<< "${{ steps.repos.outputs.repos }}"

      - name: Generate latest.csv (last 2 dates only, for ESP32 consumption)
        run: |
          CSV=traffic.csv
          LATEST=latest.csv
          HEADER=$(head -1 "$CSV")

          # Find the two most recent distinct dates
          DATES=$(tail -n +2 "$CSV" | cut -d',' -f1 | sort -u | tail -2)

          echo "$HEADER" > "$LATEST"
          for D in $DATES; do
            grep "^$D," "$CSV" >> "$LATEST"
          done

      - name: Commit updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic.csv latest.csv
          git diff --cached --quiet || git commit -m "stats: $(date -u '+%Y-%m-%d')"
          git push
